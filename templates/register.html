<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Job Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: var(--cream); display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div style="width: 100%; max-width: 420px; padding: 20px;">
    <div style="text-align: center; margin-bottom: 32px;">
        <h1 style="font-family: 'Playfair Display', serif; color: var(--burgundy); font-size: 2rem;">Job Tracker</h1>
        <p style="color: var(--text-mid);">Create your account</p>
    </div>

    <div class="form-card">
        {% if error %}
        <div class="flash flash-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="e.g. Stephanie" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--text-mid);">
            Already have an account? <a href="/login" style="color: var(--burgundy); font-weight: 600;">Sign In</a>
        </p>
    </div>
</div>

</body>
</html>

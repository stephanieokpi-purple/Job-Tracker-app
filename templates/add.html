<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Application – Job Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <svg width="40" height="40" viewBox="0 0 60 60" style="margin-bottom:8px;">
            <path d="M30 6 L50 14 L50 30 Q50 44 30 54 Q10 44 10 30 L10 14 Z" fill="none" stroke="white" stroke-width="2"/>
            <text x="30" y="36" text-anchor="middle" fill="white" font-size="16" font-family="Georgia" font-weight="bold">JT</text>
        </svg>
        <h2>Job Tracker</h2>
        <p>Your career dashboard</p>
    </div>
    <nav>
        <a href="/"><span class="icon">📊</span> Dashboard</a>
        <a href="/analytics"><span class="icon">📈</span> Analytics</a>
        <a href="/jobs"><span class="icon">🔍</span> Browse Jobs</a>
        <a href="/jobs/add"><span class="icon">➕</span> Add Job</a>
        <a href="/applications"><span class="icon">📋</span> My Applications</a>
        <a href="/applications/add" class="active"><span class="icon">✏️</span> Add Application</a>
        <a href="/profile"><span class="icon">👤</span> Profile</a>
        <a href="/logout"><span class="icon">🚪</span> Logout</a>
    </nav>
</aside>

<main class="main">
    <div class="page-header">
        <h1>Add Application</h1>
        <p>Track a new job you've applied to.</p>
    </div>

    <div class="form-card">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="e.g. Google" required>
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" name="job_title" placeholder="e.g. Software Engineer" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date Applied</label>
                    <input type="date" name="date_applied" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status" required>
                        <option value="Applied">Applied</option>
                        <option value="Interview Scheduled">Interview Scheduled</option>
                        <option value="Offer Received">Offer Received</option>
                        <option value="Rejected">Rejected</option>
                        <option value="Withdrawn">Withdrawn</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="">Select...</option>
                        <option value="High">🔴 High</option>
                        <option value="Medium">🟡 Medium</option>
                        <option value="Low">🟢 Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Interview Date</label>
                    <input type="date" name="interview_date">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" placeholder="e.g. New York, NY">
                </div>
                <div class="form-group">
                    <label>Work Type</label>
                    <select name="work_type">
                        <option value="">Select...</option>
                        <option value="Remote">Remote</option>
                        <option value="Onsite">Onsite</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Employment Type</label>
                    <select name="employment_type">
                        <option value="">Select...</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                        <option value="Internship">Internship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary Range</label>
                    <input type="text" name="salary_range" placeholder="e.g. $80k – $100k">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Contact Person / Recruiter</label>
                    <input type="text" name="contact_person" placeholder="e.g. Jane Smith">
                </div>
                <div class="form-group">
                    <label>Follow-up Reminder Date</label>
                    <input type="date" name="followup_date">
                </div>
            </div>

            <div class="form-group">
                <label>Job URL</label>
                <input type="url" name="job_url" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Job Portal / Source</label>
                <input type="text" name="source" placeholder="e.g. LinkedIn, Indeed">
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" placeholder="Any notes about this application..."></textarea>
            </div>

            <div class="card-actions">
                <button type="submit" class="btn btn-primary">Save Application</button>
                <a href="/applications" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
